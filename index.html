<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nChat</title>
    <script src="js/marked.min.js"></script>
    <script src="js/purify.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>

<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="toolbar-title-wrapper" id="title-wrapper">
                <h1 id="app-title">nChat</h1>
                <svg class="toolbar-chevron" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                </svg>
            </div>
            <div class="toolbar-actions">
                <button id="toggle-settings-btn" title="设置">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.25C14.38,2.01,14.17,2,13.92,2h-3.84 c-0.25,0-0.46,0.19-0.48,0.43l-0.35,2.57c-0.6,0.25-1.17,0.59-1.62,0.94l-2.39-0.96c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.55 c-0.11,0.2-0.06,0.47,0.12,0.61l2.03,1.58C4.82,11.06,4.8,11.38,4.8,11.7c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.35,2.57 c0.02,0.24,0.23,0.43,0.48,0.43h3.84c0.25,0,0.46-0.19,0.48-0.43l0.35-2.57c0.6-0.25,1.17-0.59,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.11-0.2,0.06-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z">
                        </path>
                    </svg>
                </button>
                <button id="menu-btn" title="菜单">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path
                            d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
        <div id="main-menu" class="dropdown-menu">
            <a href="#" id="theme-toggle-btn">切换深色/浅色模式</a>
            <a href="#" id="export-conversation-btn">导出对话</a>
            <a href="#" id="backup-conversation-btn">备份对话</a>
            <a href="#" id="restore-conversation-btn">恢复对话</a>
            <a href="#" id="clear-chat-btn">清除对话</a>
        </div>
        <div id="config-dropdown-menu" class="dropdown-menu">
            <!-- 动态生成配置列表 -->
        </div>
        <div class="settings-panel" id="settings-panel">
            <div class="settings-header">
                <div class="input-group">
                    <label for="config-select">配置选择</label>
                    <div class="config-select-row">
                        <select id="config-select"></select>
                        <button id="add-config-btn" class="btn btn-secondary btn-sm" title="新建配置">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                            </svg>
                        </button>
                        <button id="delete-config-btn" class="btn btn-destructive btn-sm" title="删除配置">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path
                                    d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="settings-body">
                <div class="input-group">
                    <label for="config-name">配置名称</label>
                    <input type="text" id="config-name" placeholder="例如: GPT-4o 编程助手">
                </div>
                <hr style="border:0; border-top:1px solid var(--glass-border-color); width:100%; margin: 5px 0;">
                <div class="input-group">
                    <label for="system-prompt">System Prompt</label>
                    <textarea id="system-prompt" rows="3" placeholder="例如: 你是一个专业的全栈工程师，请用中文回答。"></textarea>
                </div>
                <div class="input-group"><label for="api-url">Base URL</label><input type="text" id="api-url" placeholder="例如: https://api.openai.com/v1"></div>
                <div class="input-group"><label for="api-key">API Key</label><input type="password" id="api-key"></div>
                <div class="input-group"><label for="model-id">Model ID</label><input type="text" id="model-id"
                        placeholder="例如: gpt-4-vision-preview"></div>
                <!-- Advanced Settings Section -->
                <button id="advanced-toggle-btn" class="advanced-toggle-btn">高级参数设置</button>
                <div id="advanced-settings-container" class="advanced-settings-container">
                    <div class="input-group">
                        <div class="slider-row">
                            <label for="temp-slider">Temp</label>
                            <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="1">
                            <input type="number" id="temp-input" min="0" max="2" step="0.1" value="1">
                        </div>
                    </div>
                    <div class="input-group">
                        <div class="slider-row">
                            <label for="topp-slider">Top P</label>
                            <input type="range" id="topp-slider" min="0" max="2" step="0.05" value="0.95">
                            <input type="number" id="topp-input" min="0" max="2" step="0.05" value="0.95">
                        </div>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <div class="button-group">
                    <span id="save-status">已保存</span>
                    <input type="file" id="import-settings-input" hidden accept=".json">
                    <button id="import-settings-btn" class="btn btn-secondary">导入配置</button>
                    <button id="export-settings-btn" class="btn btn-secondary">导出配置</button>
                    <button id="save-settings-btn" class="btn btn-primary">保存配置</button>
                </div>
            </div>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="input-area-container" id="input-area-container">
            <div id="image-preview-container"></div>
            <div class="input-controls">
                <input type="file" id="image-input" hidden multiple accept="image/*">
                <button id="upload-btn" class="icon-btn" title="上传图片">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                    </svg>
                </button>
                <textarea id="user-input" placeholder="输入消息..." rows="1"></textarea>
                <button id="send-btn" class="icon-btn" title="发送">
                    <!-- 默认发送图标 -->
                    <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                    <!-- 停止图标 (隐藏) -->
                    <svg class="stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                        <path d="M6 6h12v12H6z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <div id="image-lightbox" class="lightbox">
        <span id="lightbox-close" class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>
    <div id="custom-prompt-overlay" class="modal-overlay">
        <div class="modal-content">
            <h2 id="custom-prompt-title"></h2>
            <p id="custom-prompt-message"></p>
            <div class="modal-buttons">
                <button id="custom-prompt-cancel" class="btn btn-secondary">取消</button>
                <button id="custom-prompt-confirm" class="btn btn-primary">确认</button>
            </div>
        </div>
    </div>
    <div id="edit-modal-overlay" class="modal-overlay">
        <div id="edit-modal-content" class="modal-content">
            <h2>编辑消息</h2>
            <textarea id="edit-modal-textarea" rows="5"></textarea>
            <div class="modal-buttons">
                <button id="edit-modal-cancel" class="btn btn-secondary">取消</button>
                <button id="edit-modal-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>
    
</body>

</html>
